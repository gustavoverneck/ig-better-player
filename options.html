<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <title>IG Better Player</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        max-width: 520px;
        padding: 24px;
      }

      label {
        display: block;
        margin: 16px 0;
      }

      input,
      select {
        margin-top: 4px;
      }
    </style>
  </head>
  <body>
    <h1>IG Better Player</h1>

    <label>
      Volume padrão
      <input id="volume" type="range" min="0" max="1" step="0.01" />
      <span id="volumeValue"></span>
    </label>

    <label>
      Velocidade padrão
      <select id="playbackRate">
        <option value="0.5">0.5x</option>
        <option value="1">1x</option>
        <option value="1.25">1.25x</option>
        <option value="1.5">1.5x</option>
        <option value="2">2x</option>
      </select>
    </label>

    <label>
      Segundos para pular com ←/→
      <input id="skipSeconds" type="number" min="1" max="30" />
    </label>

    <label>
      <input id="showTips" type="checkbox" />
      Mostrar dicas na tela
    </label>

    <script src="options.js"></script>
  </body>
</html>
